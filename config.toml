# KGCP Configuration
# Copy to ~/.kgcp/config.toml for global defaults

[llm]
model = "gemma3"
api_key = "sk-1234"
base_url = "http://localhost:11434/v1/chat/completions"
max_tokens = 8192
temperature = 0.8

[chunking]
chunk_size = 100    # words per chunk
overlap = 20        # word overlap between chunks

[standardization]
enabled = true
use_llm = false     # Set true for LLM-assisted entity resolution

[inference]
enabled = false     # Set true to infer cross-community relationships
use_llm = false

[storage]
db_path = "~/.kgcp/knowledge.db"

[retrieval]
default_hops = 2
default_budget = 2048
default_format = "yaml"

[packing]
include_provenance = true
include_entity_metadata = true
