# KGCP Configuration
# Copy to ~/.kgcp/config.toml for global defaults

[llm]
model = "gemma3:12b"
api_key = "sk-1234"
base_url = "http://localhost:11434/v1/chat/completions"
max_tokens = 8192
temperature = 0.8

[chunking]
chunk_size = 100    # words per chunk
overlap = 20        # word overlap between chunks

[standardization]
enabled = true
use_llm = false     # Set true for LLM-assisted entity resolution

[inference]
enabled = false     # Set true to infer cross-community relationships
use_llm = false

[storage]
db_path = "~/.kgcp/knowledge.db"

[retrieval]
default_hops = 2
default_budget = 2048
default_format = "yaml"

[packing]
include_provenance = true
include_entity_metadata = true

[anomaly]
min_display_score = 0.3
anomaly_boost_weight = 0.1

[anomaly.signal_weights]
new_entity = 0.30
new_edge = 0.25
community_mismatch = 0.20
unusual_predicate = 0.15
centrality_drift = 0.10
